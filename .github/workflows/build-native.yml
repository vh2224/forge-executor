# [FORGE2] disabled for fork — ver docs/forge/FORGE2-M0-WORKFLOW-TRIAGE.md
name: Build Native Binaries

# NOTE: no `push: tags: v*` trigger. The production release (npm-publish.yml,
# channel=latest) already builds and publishes all @opengsd/engine-* packages
# from the release commit, then pushes the v* tag. Re-triggering here on that tag
# caused a redundant 5x native rebuild + publish/verify and confusing parallel
# red runs on otherwise-successful releases. This workflow is now manual-only,
# for bootstrapping missing platform packages.
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish platform packages to npm"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      publish_auth:
        description: "npm auth: token creates/bootstrap-publishes packages; trusted only works if npm trusts build-native.yml"
        required: false
        default: "trusted"
        type: choice
        options:
          - "trusted"
          - "token"
      platform_packages_only:
        description: "Publish @opengsd/engine-* only (skip @opengsd/gsd-pi; use to bootstrap missing platform packages)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      platform_version:
        description: "Publish engine packages at this semver (defaults to package.json version; use before prod release when main is not bumped yet)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            platform: darwin-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            platform: darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64-gnu
          - os: blacksmith-4vcpu-ubuntu-2404-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64-gnu
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64-msvc

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Add Rust compilation target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: native-${{ matrix.platform }}
          workspaces: |
            native -> target

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build native addon
        working-directory: native/crates/engine
        env:
          # CARGO_ENCODED_RUSTFLAGS overrides target-specific rustflags in
          # .cargo/config.toml, which sets -C target-cpu=native for dev builds.
          # CI must produce portable binaries.
          CARGO_ENCODED_RUSTFLAGS: ""
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp native/target/${{ matrix.target }}/release/libgsd_engine.dylib artifacts/gsd_engine.node 2>/dev/null || \
          cp native/target/${{ matrix.target }}/release/libgsd_engine.so artifacts/gsd_engine.node 2>/dev/null || \
          { echo "::error::No library found for ${{ matrix.platform }}"; exit 1; }
          ls -la artifacts/

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir artifacts
          copy native\target\${{ matrix.target }}\release\gsd_engine.dll artifacts\gsd_engine.node

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform }}
          path: artifacts/gsd_engine.node
          if-no-files-found: error

  publish:
    needs: build
    if: github.event.inputs.publish == 'true'
    # npm trusted publishing + provenance require GitHub-hosted runners (not Blacksmith).
    runs-on: ubuntu-latest
    name: Publish platform packages

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.12.1

      # No `cache: pnpm` here. In platform_packages_only bootstrap mode the
      # "Install dependencies" step is skipped, so `pnpm install` never creates a
      # store — and setup-node's post-job cache save then fails the whole job with
      # "Path Validation Error: Path(s) specified for caching do(es) not exist",
      # even though every publish step succeeded. The publish job's single install
      # gains little from caching, so drop it for reliability.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm publish toolchain
        run: |
          node -e "const [major, minor] = process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && minor < 14)) { throw new Error('npm trusted publishing requires Node >= 22.14.0'); }"
          node -e "const v=require('child_process').execSync('npm --version',{encoding:'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) { throw new Error('npm trusted publishing requires npm >= 11.5.1'); }"

      - name: Select npm publish auth
        run: |
          if [ "${{ github.event.inputs.publish_auth || 'trusted' }}" = "token" ]; then
            echo "Using NPM_TOKEN for npm publish bootstrap."
          else
            echo "Using npm trusted publishing for npm publish."
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Copy binaries to platform packages
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            cp "artifacts/native-${platform}/gsd_engine.node" "native/npm/${platform}/gsd_engine.node"
            echo "Copied binary for ${platform}"
            ls -la "native/npm/${platform}/"
          done

      - name: Sync platform package versions
        run: node native/scripts/sync-platform-versions.cjs

      - name: Apply platform version override
        if: github.event.inputs.platform_version != ''
        env:
          PLATFORM_VERSION: ${{ github.event.inputs.platform_version }}
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            node -e "
              const fs = require('fs');
              const path = 'native/npm/${platform}/package.json';
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.version = process.env.PLATFORM_VERSION;
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            "
          done
          echo "Engine packages set to version ${PLATFORM_VERSION}"

      - name: Detect prerelease version
        id: version-check
        run: |
          VERSION="${{ github.event.inputs.platform_version || '' }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          if echo "$VERSION" | grep -q '-next\.'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "tag_flag=--tag next" >> "$GITHUB_OUTPUT"
            echo "Prerelease detected: ${VERSION} → publishing with --tag next"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "tag_flag=--tag latest" >> "$GITHUB_OUTPUT"
            echo "Stable release: ${VERSION} → publishing with --tag latest"
          fi

      - name: Require token auth for packages not on npm yet
        if: github.event.inputs.publish_auth != 'token'
        run: |
          MISSING=()
          for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            PKG="@opengsd/engine-${platform}"
            if ! npm view "${PKG}" name >/dev/null 2>&1; then
              MISSING+=("${PKG}")
            fi
          done
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ "${{ github.event.inputs.platform_packages_only }}" != "true" ]; then
            while IFS= read -r entry; do
              pkg="${entry%%:*}"
              if ! npm view "${pkg}" name >/dev/null 2>&1; then
                MISSING+=("${pkg}")
              fi
            done < <(node scripts/lib/npm-release-packages.cjs --workspace-dirs)
          fi
          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "::error::These npm packages do not exist on npm yet:"
            for pkg in "${MISSING[@]}"; do
              echo "::error::  - ${pkg}"
            done
            echo "::error::Trusted publishing is configured after first publish. Re-run with publish_auth=token and NPM_TOKEN set (see docs/dev/ci-cd-pipeline.md)."
            exit 1
          fi

      - name: Verify NPM_TOKEN is configured for token bootstrap
        if: github.event.inputs.publish_auth == 'token'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::publish_auth=token requires the NPM_TOKEN repository secret."
            echo "::error::Create an npm automation token with publish access to @opengsd, add it as NPM_TOKEN, then re-run."
            exit 1
          fi
          npm whoami

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ github.event.inputs.publish_auth == 'token' && secrets.NPM_TOKEN || '' }}
          TAG_FLAG: ${{ steps.version-check.outputs.tag_flag }}
          ENGINE_VERSION: ${{ github.event.inputs.platform_version || '' }}
        run: bash scripts/publish-engine-packages.sh

      - name: Verify platform packages are published
        run: |
          VERSION="${{ github.event.inputs.platform_version || '' }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "Verifying platform packages at version ${VERSION}..."
          # Exponential backoff: 5s, 10s, 20s, 30s, 30s (max 5 attempts, ~95s worst case vs fixed 30s + single check)
          DELAY=5
          for attempt in $(seq 1 5); do
            FAILED=0
            for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
              PKG="@opengsd/engine-${platform}"
              PUBLISHED=$(npm view "${PKG}@${VERSION}" version 2>/dev/null || echo "")
              if [ "${PUBLISHED}" != "${VERSION}" ]; then
                FAILED=1
                break
              fi
            done
            if [ "${FAILED}" = "0" ]; then
              echo "All platform packages verified (attempt ${attempt})."
              break
            fi
            if [ "$attempt" = "5" ]; then
              echo "::error::One or more platform packages not found after 5 attempts. Aborting."
              for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
                PKG="@opengsd/engine-${platform}"
                PUBLISHED=$(npm view "${PKG}@${VERSION}" version 2>/dev/null || echo "")
                if [ "${PUBLISHED}" = "${VERSION}" ]; then
                  echo "  ✓ ${PKG}@${VERSION}"
                else
                  echo "  ✗ ${PKG}@${VERSION} (got: '${PUBLISHED}')"
                fi
              done
              exit 1
            fi
            echo "  Attempt ${attempt}: not all packages visible yet, retrying in ${DELAY}s..."
            sleep "$DELAY"
            DELAY=$((DELAY * 2))
            if [ "$DELAY" -gt 30 ]; then DELAY=30; fi
          done

      - name: Install dependencies
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.platform_packages_only != 'true'
        run: |
          # Install WITH optional deps. The web host build (next/tailwind) needs
          # lightningcss's platform-native binary, which ships as an optionalDependency;
          # --no-optional skips it and breaks `next build` with
          # "Cannot find module '../lightningcss.linux-x64-gnu.node'". The @opengsd/engine-*
          # optional deps are already published by this point, so a full install resolves.
          pnpm install --lockfile-only
          pnpm install --frozen-lockfile

      - name: Build
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.platform_packages_only != 'true'
        run: pnpm run build

      - name: Verify dist exists
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.platform_packages_only != 'true'
        run: test -s dist/loader.js || { echo "::error::dist/loader.js missing or empty after build"; exit 1; }

      - name: Validate package is installable
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.platform_packages_only != 'true'
        run: pnpm run validate-pack

      # Bootstrap path. Uses the SAME derived, complete package list as the
      # production release (scripts/publish-workspace-packages.sh) so the two
      # paths can't diverge — the old inline "contracts rpc-client mcp-server"
      # list here is what dropped cloud-mcp-gateway + daemon from npm.
      - name: Publish workspace packages
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.platform_packages_only != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ github.event.inputs.publish_auth == 'token' && secrets.NPM_TOKEN || '' }}
          TAG_FLAG: ${{ steps.version-check.outputs.tag_flag }}
        run: |
          node scripts/prepack-resolve-workspace.cjs
          trap 'node scripts/postpack-restore-workspace.cjs' EXIT
          bash scripts/publish-workspace-packages.sh

      - name: Publish main package
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.platform_packages_only != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ github.event.inputs.publish_auth == 'token' && secrets.NPM_TOKEN || '' }}
        run: |
          node scripts/prepack-resolve-workspace.cjs
          trap 'node scripts/postpack-restore-workspace.cjs' EXIT
          # --ignore-scripts: skip prepublishOnly since we built explicitly above
          if OUTPUT=$(npm publish --ignore-scripts ${{ steps.version-check.outputs.tag_flag }} 2>&1); then
            echo "$OUTPUT"
          else
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published\|You cannot publish over"; then
              echo "Already published, skipping"
            else
              echo "$OUTPUT"
              exit 1
            fi
          fi

      - name: Post-publish smoke test
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.platform_packages_only != 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          npm init -y > /dev/null 2>&1

          # Wait for npm registry with exponential backoff (5s, 10s, 20s, 30s, 30s, 30s, 30s — max ~155s vs fixed 5min)
          echo "Waiting for @opengsd/gsd-pi@${VERSION} to appear on npm..."
          DELAY=5
          for attempt in $(seq 1 8); do
            PUBLISHED=$(npm view "@opengsd/gsd-pi@${VERSION}" version 2>/dev/null || echo "")
            if [ "${PUBLISHED}" = "${VERSION}" ]; then
              echo "  ✓ Version ${VERSION} visible on npm (attempt ${attempt})"
              break
            fi
            if [ "$attempt" = "8" ]; then
              echo "::warning::@opengsd/gsd-pi@${VERSION} not visible on npm after 8 attempts — skipping smoke test"
              exit 0
            fi
            echo "  Attempt ${attempt}: not yet visible, retrying in ${DELAY}s..."
            sleep "$DELAY"
            DELAY=$((DELAY * 2))
            if [ "$DELAY" -gt 30 ]; then DELAY=30; fi
          done

          # Install and verify with backoff (5s, 10s, 20s)
          echo "Installing @opengsd/gsd-pi@${VERSION}..."
          DELAY=5
          for attempt in 1 2 3; do
            if npm install "@opengsd/gsd-pi@${VERSION}" 2>&1 | tee /tmp/install-output.txt; then
              echo "  ✓ Install succeeded"
              RAW=$(node node_modules/@opengsd/gsd-pi/dist/loader.js --version 2>&1 || echo "FAILED")
              ACTUAL=$(echo "$RAW" | sed 's/\x1b\[[0-9;]*m//g' | grep -oE "^${VERSION}$" | head -1)
              if [ "$ACTUAL" = "$VERSION" ]; then
                echo "  ✓ gsd --version = ${VERSION}"
                echo "Published package is functional"
                exit 0
              else
                echo "::error::Version mismatch: expected ${VERSION} in output:"
                echo "$RAW"
                exit 1
              fi
            fi
            echo "Install attempt ${attempt}/3 failed, retrying in ${DELAY}s..."
            cat /tmp/install-output.txt
            sleep "$DELAY"
            DELAY=$((DELAY * 2))
          done
          echo "::error::Smoke test failed — @opengsd/gsd-pi@${VERSION} not installable"
          exit 1

      - name: Post-publish MCP server smoke test
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.platform_packages_only != 'true'
        run: |
          set -o pipefail
          VERSION=$(node -p "require('./package.json').version")
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          npm init -y > /dev/null 2>&1

          echo "Installing @opengsd/mcp-server@${VERSION}..."
          DELAY=5
          for attempt in 1 2 3; do
            if npm install "@opengsd/mcp-server@${VERSION}" 2>&1 | tee /tmp/mcp-install-output.txt; then
              test -x node_modules/.bin/gsd-mcp-server || { echo "::error::gsd-mcp-server bin missing"; exit 1; }
              node -e "import('@opengsd/mcp-server').then((mod) => { if (!Object.keys(mod).length) throw new Error('empty @opengsd/mcp-server exports'); })"
              echo "Published MCP server package is functional"
              exit 0
            fi
            echo "MCP server install attempt ${attempt}/3 failed, retrying in ${DELAY}s..."
            cat /tmp/mcp-install-output.txt
            sleep "$DELAY"
            DELAY=$((DELAY * 2))
          done
          echo "::error::Smoke test failed — @opengsd/mcp-server@${VERSION} not installable"
          exit 1

      - name: Verify dist-tag after publish
        if: (github.event_name != 'workflow_dispatch' || github.event.inputs.platform_packages_only != 'true') && steps.version-check.outputs.is_prerelease == 'false'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Verifying npm dist-tag 'latest' points to ${VERSION}..."
          DELAY=5
          for attempt in $(seq 1 6); do
            LATEST=$(npm view @opengsd/gsd-pi dist-tags.latest 2>/dev/null || echo "")
            if [ "${LATEST}" = "${VERSION}" ]; then
              echo "  ✓ npm dist-tags.latest = ${VERSION}"
              exit 0
            fi
            echo "  Attempt ${attempt}/6: latest=${LATEST}, expected=${VERSION}, retrying in ${DELAY}s..."
            sleep "$DELAY"
            DELAY=$((DELAY * 2))
            if [ "$DELAY" -gt 30 ]; then DELAY=30; fi
          done
          echo "::error::dist-tags.latest is '${LATEST}' but expected '${VERSION}' — run: npm dist-tag add @opengsd/gsd-pi@${VERSION} latest"
          exit 1
