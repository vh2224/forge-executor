# [FORGE2] disabled for fork — ver docs/forge/FORGE2-M0-WORKFLOW-TRIAGE.md
name: Security audit

on: { workflow_dispatch: {} }
permissions:
  contents: read

env:
  SECURITY_AUDIT_BLOCKING: ${{ vars.SECURITY_AUDIT_BLOCKING }}
  NPM_AUDIT_SEVERITY: ${{ vars.NPM_AUDIT_SEVERITY }}

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: dependency audit (${{ matrix.workspace }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: "."
            artifact: "root"
            audit_command: "pnpm audit --json --prod"
          - workspace: "vscode-extension"
            artifact: "vscode-extension"
            audit_command: "npm audit --json --omit=dev"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable

      - name: dependency audit
        working-directory: ${{ matrix.workspace }}
        run: |
          ${{ matrix.audit_command }} > dependency-audit.json || true

          node <<'NODE'
          const fs = require("fs");

          const severityOrder = ["info", "low", "moderate", "high", "critical"];
          const threshold = (process.env.NPM_AUDIT_SEVERITY || "high").toLowerCase();
          const thresholdIndex = severityOrder.includes(threshold)
            ? severityOrder.indexOf(threshold)
            : severityOrder.indexOf("high");
          const blocking = process.env.SECURITY_AUDIT_BLOCKING === "true";

          const audit = JSON.parse(fs.readFileSync("dependency-audit.json", "utf8") || "{}");
          const counts = { info: 0, low: 0, moderate: 0, high: 0, critical: 0 };

          if (audit.metadata?.vulnerabilities) {
            for (const severity of severityOrder) {
              counts[severity] = Number(audit.metadata.vulnerabilities[severity] || 0);
            }
          } else if (audit.vulnerabilities) {
            for (const vulnerability of Object.values(audit.vulnerabilities)) {
              const severity = vulnerability?.severity;
              if (severity in counts) counts[severity] += 1;
            }
          }

          const findingsAtThreshold = severityOrder
            .slice(thresholdIndex)
            .reduce((total, severity) => total + counts[severity], 0);

          const summary = [
            "# dependency audit summary",
            "",
            `Workspace: ${process.cwd()}`,
            `Blocking: ${blocking}`,
            `Threshold: ${severityOrder[thresholdIndex]}`,
            `Findings at or above threshold: ${findingsAtThreshold}`,
            "",
            "| Severity | Count |",
            "| --- | ---: |",
            ...severityOrder.map((severity) => `| ${severity} | ${counts[severity]} |`),
            "",
          ].join("\n");

          fs.writeFileSync("dependency-audit-summary.md", summary);
          if (process.env.GITHUB_STEP_SUMMARY) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${summary}\n`);
          }

          if (blocking && findingsAtThreshold > 0) {
            process.exit(1);
          }
          NODE

      - name: Upload dependency audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-audit-${{ matrix.artifact }}
          path: |
            ${{ matrix.workspace }}/dependency-audit.json
            ${{ matrix.workspace }}/dependency-audit-summary.md

  cargo-audit:
    name: cargo audit
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v7

      - name: Install cargo-audit
        uses: taiki-e/install-action@1cacf5c5198b25f60b90968ce45860e926d584b0 # cargo-audit

      - name: cargo audit
        working-directory: native
        run: |
          cargo audit --json > cargo-audit.json || true

          node <<'NODE'
          const fs = require("fs");

          const blocking = process.env.SECURITY_AUDIT_BLOCKING === "true";
          const audit = JSON.parse(fs.readFileSync("cargo-audit.json", "utf8") || "{}");
          const vulnerabilities = audit.vulnerabilities || {};
          const advisoryCount = Number(vulnerabilities.count || vulnerabilities.list?.length || 0);
          const warningCount = Array.isArray(audit.warnings) ? audit.warnings.length : 0;

          const summary = [
            "# cargo audit summary",
            "",
            `Workspace: ${process.cwd()}`,
            `Blocking: ${blocking}`,
            `Advisories: ${advisoryCount}`,
            `Warnings: ${warningCount}`,
            "",
          ].join("\n");

          fs.writeFileSync("cargo-audit-summary.md", summary);
          if (process.env.GITHUB_STEP_SUMMARY) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${summary}\n`);
          }

          if (blocking && (advisoryCount > 0 || warningCount > 0)) {
            process.exit(1);
          }
          NODE

      - name: Upload cargo audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cargo-audit
          path: |
            native/cargo-audit.json
            native/cargo-audit-summary.md

  secret-scan-full:
    # Full-tree secret scan. The per-PR scan in ci-fast-gates.sh is diff-only, so
    # it cannot catch a secret that landed before the gate existed. This runs the
    # scanner over every tracked file as a scheduled safety net (and on demand).
    name: full-tree secret scan
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Scan all tracked files for secrets
        run: node scripts/secret-scan.mjs --all
