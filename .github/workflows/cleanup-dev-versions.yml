# [FORGE2] disabled for fork — ver docs/forge/FORGE2-M0-WORKFLOW-TRIAGE.md
name: Cleanup Dev Versions

on: { workflow_dispatch: {} }
permissions:
  contents: read

jobs:
  cleanup:
    name: Remove stale -dev versions
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Unpublish old dev versions
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          PACKAGE="@opengsd/gsd-pi"
          MAX_AGE_DAYS=30
          CUTOFF=$(date -u -d "-${MAX_AGE_DAYS} days" +%s 2>/dev/null || date -u -v-${MAX_AGE_DAYS}d +%s)

          echo "Fetching all versions of ${PACKAGE}..."
          VERSIONS=$(npm view "${PACKAGE}" versions --json 2>/dev/null | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8'));
            const versions = Array.isArray(data) ? data : [data];
            versions.filter(v => v.includes('-dev.')).forEach(v => console.log(v));
          ")

          if [ -z "${VERSIONS}" ]; then
            echo "No dev versions found."
            exit 0
          fi

          REMOVED=0
          while IFS= read -r VERSION; do
            # `npm view pkg@ver time --json` returns the FULL time map
            # ({created, modified, "<ver>": "<iso>"}), not a single timestamp —
            # `new Date(map)` is NaN, which silently disabled this whole job.
            # Index the map by the specific version (fall back to `modified`).
            # TARGET_VERSION is prefixed on `node`, not `npm view`: the two sides
            # of the pipe are separate processes, so a prefix on `npm view` never
            # reaches the parser — `data[undefined]` would silently fall back to
            # `modified` instead of the version-specific publish timestamp.
            if ! PUBLISH_TIME=$(npm view "${PACKAGE}@${VERSION}" time --json 2>/dev/null | TARGET_VERSION="${VERSION}" node -e "
              const data = JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8'));
              const iso = data[process.env.TARGET_VERSION] ?? data.modified;
              const ts = Math.floor(new Date(iso).getTime() / 1000);
              if (!Number.isFinite(ts)) {
                console.error('Could not resolve publish time for ' + process.env.TARGET_VERSION + ' from: ' + JSON.stringify(data));
                process.exit(1);
              }
              console.log(ts);
            " 2>&1); then
              echo "::warning::Could not parse publish time for ${PACKAGE}@${VERSION} — skipping."
              continue
            fi

            if [ "${PUBLISH_TIME}" -gt 0 ] && [ "${PUBLISH_TIME}" -lt "${CUTOFF}" ]; then
              echo "Unpublishing ${PACKAGE}@${VERSION} (published $(date -u -d "@${PUBLISH_TIME}" +%Y-%m-%d 2>/dev/null || date -u -r "${PUBLISH_TIME}" +%Y-%m-%d))"
              npm unpublish "${PACKAGE}@${VERSION}" || echo "  Warning: failed to unpublish ${VERSION}"
              REMOVED=$((REMOVED + 1))
            fi
          done <<< "${VERSIONS}"

          echo "Removed ${REMOVED} stale dev version(s)."
