# [FORGE2] disabled for fork — ver docs/forge/FORGE2-M0-WORKFLOW-TRIAGE.md
# @opengsd/gsd-pi + CI: manual npm publish with approval gates
name: NPM Publish

# Manual npm publish. npm trusted publishing accepts one configured workflow
# filename per package, so dev, next, and latest publishes all live here.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "npm dist-tag or release path to publish; latest publishes/verifies @dev first, then waits for prod approval"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - next
          - latest
      ref:
        description: "Branch or SHA for standalone prerelease publishes (defaults: dev -> main, next -> next; latest always uses main)"
        required: false
        default: ""
      publish_auth:
        description: "npm auth fallback: token uses NPM_TOKEN for prerelease/native publishes; trusted uses OIDC (default)"
        required: false
        default: "trusted"
        type: choice
        options:
          - "trusted"
          - "token"

concurrency:
  group: npm-publish-${{ github.event.inputs.channel == 'latest' && 'dev' || github.event.inputs.channel }}-${{ github.event.inputs.channel == 'latest' && 'main' || github.event.inputs.ref || (github.event.inputs.channel == 'next' && 'next' || 'main') }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NPM_CONFIG_AUDIT: "false"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_LOGLEVEL: "error"

jobs:
  prerelease-publish:
    name: Publish @${{ github.event.inputs.channel == 'latest' && 'dev' || github.event.inputs.channel }}
    # npm trusted publishing + provenance require GitHub-hosted runners (not Blacksmith).
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.channel == 'latest' && 'dev' || github.event.inputs.channel }}
    container:
      image: ghcr.io/open-gsd/gsd-ci-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      env:
        GITHUB_REPO_NAME: ${{ github.repository }}
    outputs:
      version: ${{ steps.stamp.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.channel == 'latest' && 'main' || github.event.inputs.ref || (github.event.inputs.channel == 'next' && 'next' || 'main') }}
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.12.1

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
        env:
          NODE_AUTH_TOKEN: ${{ github.event.inputs.publish_auth == 'token' && secrets.NPM_TOKEN || '' }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify npm publish toolchain
        run: |
          node -e "const [major, minor] = process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && minor < 14)) { throw new Error('npm publish requires Node >= 22.14.0'); }"
          node -e "const v=require('child_process').execSync('npm --version',{encoding:'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) { throw new Error('npm publish requires npm >= 11.5.1'); }"

      - name: Verify NPM_TOKEN for token publish
        if: github.event.inputs.publish_auth == 'token'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::publish_auth=token requires the NPM_TOKEN repository secret."
            exit 1
          fi
          npm whoami

      - uses: ./.github/actions/cache-nextjs

      - name: Build core
        run: pnpm run build:core

      # The main @opengsd/gsd-pi tarball bundles packages/*/dist via its `files`
      # globs, so an unbuilt workspace package (e.g. gsd-cloud) ships broken
      # inside this dev tarball too — guard the built dist before publishing.
      - name: Verify workspace packages are built
        run: node scripts/verify-workspace-dist.cjs

      - name: Build web host
        run: pnpm run build:web-host

      - name: Stamp prerelease version and sync platform packages
        id: stamp
        env:
          VERSION_CHANNEL: ${{ github.event.inputs.channel == 'latest' && 'dev' || github.event.inputs.channel }}
        run: |
          pnpm run pipeline:version-stamp
          pnpm run sync-platform-versions
          echo "version=$(node -e 'process.stdout.write(require("./package.json").version)')" >> "$GITHUB_OUTPUT"

      # `npm publish --ignore-scripts` skips the prepublishOnly hook, so the
      # gates it would normally run must be invoked explicitly here. The prod
      # path runs verify:version-sync at "Validate package files after version
      # bump"; the prerelease path needs both checks after stamping.
      - name: Typecheck extensions (prepublishOnly parity)
        run: pnpm run typecheck:extensions

      - name: Verify version sync (prepublishOnly parity)
        run: pnpm run verify:version-sync

      - name: Smoke test
        run: |
          chmod +x dist/loader.js
          GSD_SMOKE_BINARY="$(pwd)/dist/loader.js"
          export GSD_SMOKE_BINARY
          pnpm run test:smoke

      - name: Verify native platform packages exist
        run: pnpm run verify:native-platform-packages

      - name: Validate package is installable
        run: pnpm run validate-pack

      - name: Publish @${{ github.event.inputs.channel == 'latest' && 'dev' || github.event.inputs.channel }}
        env:
          CHANNEL: ${{ github.event.inputs.channel == 'latest' && 'dev' || github.event.inputs.channel }}
        run: |
          VERSION=$(node -e 'process.stdout.write(require("./package.json").version)')
          EXISTING=$(npm view "@opengsd/gsd-pi@${VERSION}" version 2>/dev/null || true)
          if [ -n "${EXISTING}" ]; then
            TAGGED=$(npm view "@opengsd/gsd-pi" "dist-tags.${CHANNEL}" 2>/dev/null || true)
            if [ "${TAGGED}" = "${VERSION}" ]; then
              echo "Version ${VERSION} is already published and @${CHANNEL} points to it — skipping publish."
              exit 0
            fi
            echo "::error::Version ${VERSION} already exists but @${CHANNEL} points to '${TAGGED:-<unset>}'. Trusted publishing only authenticates npm publish, not dist-tag mutation."
            echo "::error::Move the tag manually if intended: npm dist-tag add @opengsd/gsd-pi@${VERSION} ${CHANNEL}"
            exit 1
          fi
          trap 'node scripts/postpack-restore-workspace.cjs' EXIT
          node scripts/prepack-resolve-workspace.cjs
          # The pre-check above is a TOCTOU window — a concurrent/manual publish
          # of the same version between the check and here would otherwise surface
          # a raw npm error. Mirror the prod path: tolerate "cannot publish over"
          # as an idempotent skip, fail loudly on anything else.
          if OUTPUT=$(npm publish --ignore-scripts --tag "${CHANNEL}" 2>&1); then
            echo "$OUTPUT"
          else
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published\|You cannot publish over"; then
              echo "Version ${VERSION} was published concurrently — verifying @${CHANNEL} tag."
              TAGGED=$(npm view "@opengsd/gsd-pi" "dist-tags.${CHANNEL}" 2>/dev/null || true)
              if [ "${TAGGED}" != "${VERSION}" ]; then
                echo "::error::@${CHANNEL} points to '${TAGGED:-<unset>}' not ${VERSION} after concurrent publish."
                echo "::error::Move the tag manually if intended: npm dist-tag add @opengsd/gsd-pi@${VERSION} ${CHANNEL}"
                exit 1
              fi
              echo "Confirmed: @${CHANNEL} → ${VERSION} (from concurrent publish)."
            else
              echo "$OUTPUT"
              exit 1
            fi
          fi
          echo "Verifying @opengsd/gsd-pi@${VERSION} can be installed from npm..."
          DELAY=10
          for attempt in $(seq 1 12); do
            PREFIX=$(mktemp -d "${RUNNER_TEMP:-/tmp}/gsd-npm-install-XXXXXX")
            CACHE=$(mktemp -d "${RUNNER_TEMP:-/tmp}/gsd-npm-cache-XXXXXX")
            if npm install -g "@opengsd/gsd-pi@${VERSION}" --ignore-scripts --prefer-online --prefix "${PREFIX}" --cache "${CACHE}"; then
              rm -rf "${PREFIX}" "${CACHE}"
              echo "Confirmed: @opengsd/gsd-pi@${VERSION} installs from npm."
              exit 0
            fi
            rm -rf "${PREFIX}" "${CACHE}"
            if [ "${attempt}" = "12" ]; then
              break
            fi
            echo "Attempt ${attempt}: package metadata or tarball not fully propagated - waiting ${DELAY}s..."
            sleep "${DELAY}"
            DELAY=$((DELAY * 2))
            if [ "${DELAY}" -gt 60 ]; then DELAY=60; fi
          done
          echo "::error::Publish step succeeded but @opengsd/gsd-pi@${VERSION} was not installable from npm after retries. Check registry tarball propagation before continuing."
          exit 1

  prerelease-verify:
    name: Verify @${{ github.event.inputs.channel == 'latest' && 'dev' || github.event.inputs.channel }} package
    needs: prerelease-publish
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.channel == 'latest' && 'main' || github.event.inputs.ref || (github.event.inputs.channel == 'next' && 'next' || 'main') }}

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.12.1

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install published @opengsd/gsd-pi@${{ github.event.inputs.channel == 'latest' && 'dev' || github.event.inputs.channel }} globally (with registry propagation retry)
        env:
          PUBLISH_VERSION: ${{ needs.prerelease-publish.outputs.version }}
          CHANNEL: ${{ github.event.inputs.channel == 'latest' && 'dev' || github.event.inputs.channel }}
        run: |
          for i in 1 2 3 4 5 6; do
            npm install -g "@opengsd/gsd-pi@${PUBLISH_VERSION}" && exit 0
            echo "Attempt $i failed - waiting 10s for npm registry propagation..."
            sleep 10
          done
          echo "::error::Failed to install @opengsd/gsd-pi@${PUBLISH_VERSION} after 6 attempts."
          echo "::error::Recommended actions: (1) investigate the failing step above, (2) if the version exists on npm, deprecate it with 'npm deprecate @opengsd/gsd-pi@${PUBLISH_VERSION} \"broken ${CHANNEL} build; see Actions run\"', (3) cut a fix and re-run NPM Publish."
          exit 1

      - name: Run smoke tests (against installed binary)
        run: |
          GSD_SMOKE_BINARY=$(which gsd)
          export GSD_SMOKE_BINARY
          pnpm run test:smoke

      - name: Install repo dependencies (for regression harness)
        run: pnpm install --frozen-lockfile

      - name: Run live regression tests (against installed binary)
        run: |
          GSD_SMOKE_BINARY=$(which gsd)
          export GSD_SMOKE_BINARY
          pnpm run test:live-regression

      - name: Warn on verify failure
        if: failure()
        env:
          PUBLISH_VERSION: ${{ needs.prerelease-publish.outputs.version }}
          CHANNEL: ${{ github.event.inputs.channel == 'latest' && 'dev' || github.event.inputs.channel }}
        run: |
          echo "::error::Post-publish verification failed for @opengsd/gsd-pi@${PUBLISH_VERSION}."
          echo "::error::Recommended actions: (1) investigate the failing step above, (2) if the version exists on npm, deprecate it with 'npm deprecate @opengsd/gsd-pi@${PUBLISH_VERSION} \"broken ${CHANNEL} build; see Actions run\"', (3) cut a fix and re-run NPM Publish."
          exit 1

  prod-release-plan:
    name: Plan Production Release
    if: ${{ github.event.inputs.channel == 'latest' }}
    needs: prerelease-verify
    runs-on: ubuntu-latest
    outputs:
      source_sha: ${{ steps.release.outputs.source_sha }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Generate changelog and determine version
        id: release
        run: |
          OUTPUT=$(node scripts/generate-changelog.mjs)
          echo "$OUTPUT" | jq .
          mkdir -p release-metadata
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "version=$(echo "$OUTPUT" | jq -r '.newVersion')" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" | jq -r '.changelogEntry' > release-metadata/changelog-entry.md
          echo "$OUTPUT" | jq -r '.releaseNotes' > release-metadata/release-notes.md

      - name: Upload release metadata
        uses: actions/upload-artifact@v7
        with:
          name: prod-release-metadata
          path: release-metadata/
          if-no-files-found: error

  prod-native-build:
    name: Build native ${{ matrix.platform }}
    if: ${{ github.event.inputs.channel == 'latest' }}
    needs: prod-release-plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            platform: darwin-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            platform: darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64-gnu
          - os: blacksmith-4vcpu-ubuntu-2404-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64-gnu
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prod-release-plan.outputs.source_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Add Rust compilation target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: native-${{ matrix.platform }}
          workspaces: |
            native -> target

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build native addon
        working-directory: native/crates/engine
        env:
          # CARGO_ENCODED_RUSTFLAGS overrides target-specific rustflags in
          # .cargo/config.toml, which sets -C target-cpu=native for dev builds.
          # CI must produce portable binaries.
          CARGO_ENCODED_RUSTFLAGS: ""
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp native/target/${{ matrix.target }}/release/libgsd_engine.dylib artifacts/gsd_engine.node 2>/dev/null || \
          cp native/target/${{ matrix.target }}/release/libgsd_engine.so artifacts/gsd_engine.node 2>/dev/null || \
          { echo "::error::No library found for ${{ matrix.platform }}"; exit 1; }
          ls -la artifacts/

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir artifacts
          copy native\target\${{ matrix.target }}\release\gsd_engine.dll artifacts\gsd_engine.node

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform }}
          path: artifacts/gsd_engine.node
          if-no-files-found: error

  prod-release:
    name: Production Release
    if: ${{ github.event.inputs.channel == 'latest' }}
    needs:
      - prod-release-plan
      - prod-native-build
    # npm trusted publishing + provenance require GitHub-hosted runners (not Blacksmith).
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Verify release source is still current
        env:
          RELEASE_SOURCE_SHA: ${{ needs.prod-release-plan.outputs.source_sha }}
        run: |
          CURRENT_SHA=$(git rev-parse HEAD)
          if [ "${CURRENT_SHA}" != "${RELEASE_SOURCE_SHA}" ]; then
            echo "::error::main moved after the production release was planned."
            echo "::error::planned=${RELEASE_SOURCE_SHA}"
            echo "::error::current=${CURRENT_SHA}"
            echo "::error::Re-run NPM Publish so native binaries, changelog, and package version are computed from the same commit."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.12.1

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify trusted publishing toolchain
        run: |
          node -e "const [major, minor] = process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && minor < 14)) { throw new Error('Trusted publishing requires Node >= 22.14.0'); }"
          node -e "const v=require('child_process').execSync('npm --version',{encoding:'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) { throw new Error('Trusted publishing requires npm >= 11.5.1'); }"

      - uses: ./.github/actions/cache-nextjs

      - name: Run live LLM tests (optional)
        continue-on-error: true
        run: pnpm run test:live || echo "::warning::Live LLM tests failed - non-blocking, but worth investigating"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GSD_LIVE_TESTS: "1"

      - name: Download release metadata
        uses: actions/download-artifact@v8
        with:
          name: prod-release-metadata
          path: release-metadata

      - name: Bump version and sync packages
        env:
          RELEASE_VERSION: ${{ needs.prod-release-plan.outputs.version }}
        run: node scripts/bump-version.mjs "$RELEASE_VERSION"

      - name: Validate package files after version bump
        run: |
          node -e "require('./package.json')" && \
          node -e "require('./packages/pi-coding-agent/package.json')" && \
          node -e "require('./pkg/package.json')" && \
          pnpm run verify:version-sync && \
          echo "All package.json files are valid"

      # typecheck:extensions resolves @gsd/* workspace imports through each
      # package's dist/*.d.ts (NodeNext), which only exist after a build. The
      # @dev job builds core before its parity typecheck; the prod job's build
      # comes later ("Build release"), so build core here too or the typecheck
      # fails with TS2307 "Cannot find module '@gsd/...'".
      - name: Build core
        run: pnpm run build:core

      - name: Typecheck extensions (prepublishOnly parity)
        run: pnpm run typecheck:extensions

      - name: Update CHANGELOG.md
        run: node scripts/update-changelog.mjs release-metadata/changelog-entry.md

      - name: Update README release highlights
        env:
          RELEASE_VERSION: ${{ needs.prod-release-plan.outputs.version }}
        run: node scripts/update-readme-release-highlights.mjs release-metadata/release-notes.md --version "$RELEASE_VERSION"

      - name: Commit and tag release
        env:
          RELEASE_SOURCE_SHA: ${{ needs.prod-release-plan.outputs.source_sha }}
          RELEASE_VERSION: ${{ needs.prod-release-plan.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          REMOTE_MAIN_SHA=$(git rev-parse origin/main)
          if [ "${REMOTE_MAIN_SHA}" != "${RELEASE_SOURCE_SHA}" ]; then
            echo "::error::main moved before the release commit could be created."
            echo "::error::planned=${RELEASE_SOURCE_SHA}"
            echo "::error::origin/main=${REMOTE_MAIN_SHA}"
            echo "::error::Re-run NPM Publish so the release includes the latest main."
            exit 1
          fi
          git add package.json pnpm-lock.yaml CHANGELOG.md README.md native/Cargo.toml native/Cargo.lock native/npm/*/package.json pkg/package.json packages/*/package.json extensions/google-search/package.json integrations/hermes/pyproject.toml integrations/hermes/open_gsd_hermes/gsd_client.py
          git commit -m "release: v${RELEASE_VERSION}"
          git tag "v${RELEASE_VERSION}"

      - name: Build release
        run: pnpm run build

      - name: Run live workflow LLM tests (optional)
        continue-on-error: true
        run: |
          chmod +x dist/loader.js
          GSD_SMOKE_BINARY="$(pwd)/dist/loader.js"
          export GSD_SMOKE_BINARY
          pnpm run test:live-workflow || echo "::warning::Live workflow LLM tests failed - non-blocking, but worth investigating"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GSD_LIVE_TESTS: "1"
          GSD_LIVE_WORKFLOW_MODEL: openai/gpt-5.4-mini

      - name: Run live regression tests (against release build)
        run: |
          chmod +x dist/loader.js
          GSD_SMOKE_BINARY="$(pwd)/dist/loader.js"
          export GSD_SMOKE_BINARY
          pnpm run test:live-regression

      - name: Download native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: native-*
          path: artifacts
          merge-multiple: false

      - name: Copy native binaries to platform packages
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            cp "artifacts/native-${platform}/gsd_engine.node" "native/npm/${platform}/gsd_engine.node"
            echo "Copied binary for ${platform}"
            ls -la "native/npm/${platform}/"
          done

      - name: Select native npm publish auth
        run: |
          if [ "${{ github.event.inputs.publish_auth || 'trusted' }}" = "token" ]; then
            echo "Using NPM_TOKEN for native package publish."
          else
            echo "Using npm trusted publishing for native package publish."
          fi

      - name: Require token auth for native packages not on npm yet
        if: github.event.inputs.publish_auth != 'token'
        run: |
          MISSING=()
          for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            PKG="@opengsd/engine-${platform}"
            if ! npm view "${PKG}" name >/dev/null 2>&1; then
              MISSING+=("${PKG}")
            fi
          done
          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "::error::These npm packages do not exist on npm yet:"
            for pkg in "${MISSING[@]}"; do
              echo "::error::  - ${pkg}"
            done
            echo "::error::Trusted publishing is configured after first publish. Re-run with publish_auth=token and NPM_TOKEN set."
            exit 1
          fi

      - name: Verify NPM_TOKEN is configured for native token publish
        if: github.event.inputs.publish_auth == 'token'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::publish_auth=token requires the NPM_TOKEN repository secret."
            exit 1
          fi
          npm whoami

      - name: Publish native platform packages for release version
        env:
          ENGINE_VERSION: ${{ needs.prod-release-plan.outputs.version }}
          NODE_AUTH_TOKEN: ${{ github.event.inputs.publish_auth == 'token' && secrets.NPM_TOKEN || '' }}
          TAG_FLAG: --tag latest
        run: bash scripts/publish-engine-packages.sh

      - name: Verify native platform packages are published
        env:
          RELEASE_VERSION: ${{ needs.prod-release-plan.outputs.version }}
        run: |
          echo "Verifying native platform packages at version ${RELEASE_VERSION}..."
          DELAY=5
          for attempt in $(seq 1 5); do
            FAILED=0
            for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
              PKG="@opengsd/engine-${platform}"
              PUBLISHED=$(npm view "${PKG}@${RELEASE_VERSION}" version 2>/dev/null || echo "")
              if [ "${PUBLISHED}" != "${RELEASE_VERSION}" ]; then
                FAILED=1
                break
              fi
            done
            if [ "${FAILED}" = "0" ]; then
              echo "All native platform packages verified (attempt ${attempt})."
              exit 0
            fi
            if [ "${attempt}" = "5" ]; then
              echo "::error::One or more native platform packages were not visible after 5 attempts."
              for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
                PKG="@opengsd/engine-${platform}"
                PUBLISHED=$(npm view "${PKG}@${RELEASE_VERSION}" version 2>/dev/null || echo "")
                if [ "${PUBLISHED}" = "${RELEASE_VERSION}" ]; then
                  echo "  ✓ ${PKG}@${RELEASE_VERSION}"
                else
                  echo "  ✗ ${PKG}@${RELEASE_VERSION} (got: '${PUBLISHED}')"
                fi
              done
              exit 1
            fi
            echo "  Attempt ${attempt}: not all packages visible yet, retrying in ${DELAY}s..."
            sleep "${DELAY}"
            DELAY=$((DELAY * 2))
            if [ "${DELAY}" -gt 30 ]; then DELAY=30; fi
          done

      - name: Verify native platform packages for release version
        run: pnpm run verify:native-platform-packages

      - name: Fold native packages into release lockfile
        env:
          RELEASE_VERSION: ${{ needs.prod-release-plan.outputs.version }}
        run: |
          # The release commit + tag are created (in "Commit and tag release") BEFORE
          # the @opengsd/engine-* native packages are published to npm. bump-version.mjs
          # runs `pnpm install --lockfile-only` at that point, and pnpm silently drops
          # the still-unpublished engine packages from optionalDependencies — so the
          # committed pnpm-lock.yaml is missing them. They are published and verified
          # now, so regenerate the lockfile and fold it back into the release commit
          # (and move the tag) before either is pushed. Without this every post-release
          # `pnpm install --frozen-lockfile` on main fails with ERR_PNPM_OUTDATED_LOCKFILE.
          pnpm install --lockfile-only
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "pnpm-lock.yaml already resolves the native packages — nothing to fold in."
            exit 0
          fi
          git add pnpm-lock.yaml
          git commit --amend --no-edit
          git tag -f "v${RELEASE_VERSION}"
          echo "Folded refreshed pnpm-lock.yaml into release commit and tag v${RELEASE_VERSION}."

      - name: Validate package is installable
        run: pnpm run validate-pack

      - name: Verify workspace packages are built
        run: node scripts/verify-workspace-dist.cjs

      # Publish the @opengsd workspace packages (contracts, rpc-client, mcp-server,
      # cloud-mcp-gateway, daemon) BEFORE the main package and BEFORE cutting the
      # release. The set is derived from each package's publishConfig, so it can't
      # drift out of sync the way the old hardcoded list did (which left
      # cloud-mcp-gateway + daemon unpublished for two releases).
      - name: Publish workspace packages to npm
        env:
          RELEASE_VERSION: ${{ needs.prod-release-plan.outputs.version }}
          NODE_AUTH_TOKEN: ${{ github.event.inputs.publish_auth == 'token' && secrets.NPM_TOKEN || '' }}
          TAG_FLAG: --tag latest
        run: |
          trap 'node scripts/postpack-restore-workspace.cjs' EXIT
          node scripts/prepack-resolve-workspace.cjs
          bash scripts/publish-workspace-packages.sh

      - name: Publish release to npm @latest
        env:
          RELEASE_VERSION: ${{ needs.prod-release-plan.outputs.version }}
        run: |
          trap 'node scripts/postpack-restore-workspace.cjs' EXIT
          node scripts/prepack-resolve-workspace.cjs
          if OUTPUT=$(npm publish --ignore-scripts --tag latest 2>&1); then
            echo "$OUTPUT"
          else
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published\|You cannot publish over"; then
              echo "::warning::${RELEASE_VERSION} concurrent publish detected — verifying @latest dist-tag."
              ACTUAL=$(npm view "@opengsd/gsd-pi" dist-tags.latest 2>/dev/null || true)
              if [ "${ACTUAL}" = "${RELEASE_VERSION}" ]; then
                echo "Confirmed: @latest already points to ${RELEASE_VERSION}; treating as success."
              else
                echo "::error::@latest dist-tag is '${ACTUAL}', not '${RELEASE_VERSION}'. Trusted publishing only authenticates npm publish, not dist-tag mutation."
                echo "::error::Promote manually if intended: npm dist-tag add @opengsd/gsd-pi@${RELEASE_VERSION} latest"
                exit 1
              fi
            else
              echo "$OUTPUT"
              exit 1
            fi
          fi
          echo "Verifying @opengsd/gsd-pi@${RELEASE_VERSION} can be installed from npm..."
          DELAY=10
          for attempt in $(seq 1 12); do
            PREFIX=$(mktemp -d "${RUNNER_TEMP:-/tmp}/gsd-npm-install-XXXXXX")
            CACHE=$(mktemp -d "${RUNNER_TEMP:-/tmp}/gsd-npm-cache-XXXXXX")
            if npm install -g "@opengsd/gsd-pi@${RELEASE_VERSION}" --ignore-scripts --prefer-online --prefix "${PREFIX}" --cache "${CACHE}"; then
              rm -rf "${PREFIX}" "${CACHE}"
              echo "Confirmed: @opengsd/gsd-pi@${RELEASE_VERSION} installs from npm."
              exit 0
            fi
            rm -rf "${PREFIX}" "${CACHE}"
            if [ "${attempt}" = "12" ]; then
              break
            fi
            echo "Attempt ${attempt}: package metadata or tarball not fully propagated - waiting ${DELAY}s..."
            sleep "${DELAY}"
            DELAY=$((DELAY * 2))
            if [ "${DELAY}" -gt 60 ]; then DELAY=60; fi
          done
          echo "::error::Publish step succeeded but @opengsd/gsd-pi@${RELEASE_VERSION} was not installable from npm after retries. Check registry tarball propagation before continuing."
          exit 1

      # Final gate: confirm EVERY required package (main + engines + workspace) is
      # actually on npm at the release version before we tag and create the GitHub
      # release. This is the stop that would have caught the two half-published
      # releases.
      - name: Verify all required packages are published on npm
        env:
          RELEASE_VERSION: ${{ needs.prod-release-plan.outputs.version }}
        run: node scripts/verify-npm-release.mjs "${RELEASE_VERSION}"

      - name: Push release commit and tag
        env:
          RELEASE_VERSION: ${{ needs.prod-release-plan.outputs.version }}
        run: |
          git push origin main
          git push origin "v${RELEASE_VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.prod-release-plan.outputs.version }}
        run: |
          gh release create "v${RELEASE_VERSION}" \
            --title "v${RELEASE_VERSION}" \
            --notes-file release-metadata/release-notes.md \
            --latest

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.prod-release-plan.outputs.version }}
        run: node scripts/release-discord-summary.cjs --tag "v${RELEASE_VERSION}" --post --allow-missing-webhook

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release Docker image
        env:
          RELEASE_VERSION: ${{ needs.prod-release-plan.outputs.version }}
        run: |
          docker build --target runtime \
            --build-arg "GSD_VERSION=${RELEASE_VERSION}" \
            -t ghcr.io/open-gsd/gsd-pi:latest \
            -t "ghcr.io/open-gsd/gsd-pi:${RELEASE_VERSION}" \
            .
          docker push "ghcr.io/open-gsd/gsd-pi:${RELEASE_VERSION}"
          docker push ghcr.io/open-gsd/gsd-pi:latest

      - name: Open back-merge PR main to next if behind
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          RELEASE_VERSION: ${{ needs.prod-release-plan.outputs.version }}
        run: |
          if ! git ls-remote --exit-code --heads origin next >/dev/null 2>&1; then
            echo "next branch does not exist yet; skipping back-merge"
            exit 0
          fi
          git fetch origin next main
          BEHIND=$(git rev-list --count origin/next..origin/main)
          if [ "$BEHIND" -gt 0 ]; then
            BRANCH="backmerge/main-to-next-v${RELEASE_VERSION}"
            git checkout -B "$BRANCH" origin/main
            git push origin "$BRANCH" --force-with-lease
            gh pr create --base next --head "$BRANCH" \
              --title "chore: back-merge main to next (v${RELEASE_VERSION})" \
              --body "Sync release commit and version bump from main into next." || true
          else
            echo "next is up to date with main; no back-merge needed"
          fi
