# Release — tag v* → build → npm publish (com provenance) → GitHub Release.
#
# Setup único (uma vez, pelo dono do repo):
#   1. npmjs.com → Access Tokens → Generate New Token → "Granular Access Token"
#      · Packages and scopes: Read and write
#      · marque "Bypass two-factor authentication" (o CI não digita OTP)
#   2. gh secret set NPM_TOKEN -R vh2224/forge-executor   (cola o token)
#
# Cortar um release:
#   git tag v2.0.0 && git push origin v2.0.0
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # criar o GitHub Release
  id-token: write   # npm provenance (asserção de origem — só funciona no CI)

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      # prepublishOnly reroda a esteira inteira (sync de versões, verificadores,
      # build, typecheck, validate-pack com smoke de instalação real) — a mesma
      # que passou localmente. --provenance só é aceito aqui dentro do Actions.
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --title "Forge Executor $GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}
