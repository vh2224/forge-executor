# Hermes × GSD integration contract tests (Python plugin + gsd read CLI)
name: Hermes Integration

on: { workflow_dispatch: {} }
permissions:
  contents: read

concurrency:
  group: hermes-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-tests:
    name: contract-tests
    timeout-minutes: 20
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          GSD_SKIP_RTK_INSTALL: '1'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build core (gsd read CLI + dist/loader.js)
        run: pnpm run build:core

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Hermes plugin (editable)
        run: pip install -e "integrations/hermes[dev]"

      - name: Run Hermes contract tests
        env:
          GSD_LOADER_PATH: ${{ github.workspace }}/dist/loader.js
        run: cd integrations/hermes && python -m pytest tests/ -q
